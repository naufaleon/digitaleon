<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim Garansi IBM Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#071533;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:800px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border-radius:25px;
padding:25px;
border:1px solid rgba(255,255,255,.1);
}

h1{
text-align:center;
margin-bottom:10px;
}

.desc{
text-align:center;
color:#cfd8e6;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
margin-bottom:6px;
font-weight:bold;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

option{
color:black;
}

.hidden{
display:none;
}

.box{
margin-top:15px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,.05);
}

.note{
font-size:13px;
line-height:1.6;
color:#8de9ff;
margin-top:10px;
}

.btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:16px;
font-weight:bold;
color:white;
background:linear-gradient(135deg,#4cc9f0,#4361ee);
}

.btn:hover{
opacity:.9;
}

.loading{
display:none;
margin-top:15px;
text-align:center;
color:#8de9ff;
}
</style>
</head>
<body>

<div class="card">

<h1>🛡 Claim Garansi IBM Store</h1>

<div class="desc">
Silahkan isi data claim garansi dengan lengkap.
</div>

<label>Nama Buyer</label>
<input type="text" id="nama">

<label>Order Via</label>
<select id="via" onchange="showForm()">
<option value="">Pilih Metode Pembelian</option>
<option value="Website">Website IBMSTORE</option>
<option value="Telegram">Telegram Bot</option>
<option value="WhatsApp">WhatsApp</option>
</select>

<div id="websiteForm" class="box hidden">

<label>Tanggal Pembelian</label>
<input type="text" id="webTanggal">

<label>Data Pembelian</label>
<textarea id="webData"></textarea>

<label>Kendala</label>
<textarea id="webMasalah"></textarea>

</div>

<div id="telegramForm" class="box hidden">

<label>Reff ID</label>
<input type="text" id="reffId">

<label>Tanggal Pembelian</label>
<input type="text" id="teleTanggal">

<label>Data Orderan / Struk</label>
<textarea id="teleData"></textarea>

<label>Kendala</label>
<textarea id="teleMasalah"></textarea>

</div>

<div id="waForm" class="box hidden">

<label>Data Orderan</label>
<textarea id="waData"></textarea>

<label>Kendala</label>
<textarea id="waMasalah"></textarea>

</div>

<div class="box">

<label>Upload Screenshot Bukti</label>

<input
type="file"
id="screenshots"
accept="image/*"
multiple>

<div class="note">
Boleh upload lebih dari 1 screenshot.
</div>

</div>

<div id="loading" class="loading">
⏳ Mengupload screenshot...
</div>

<button class="btn" onclick="kirimWA()">
Kirim Claim Garansi
</button>

</div>

<script>

const IMGBB_API_KEY = "58631cfca72761d8119b18214390d01a";

function showForm(){

document.getElementById("websiteForm").classList.add("hidden");
document.getElementById("telegramForm").classList.add("hidden");
document.getElementById("waForm").classList.add("hidden");

const via = document.getElementById("via").value;

if(via==="Website"){
document.getElementById("websiteForm").classList.remove("hidden");
}

if(via==="Telegram"){
document.getElementById("telegramForm").classList.remove("hidden");
}

if(via==="WhatsApp"){
document.getElementById("waForm").classList.remove("hidden");
}

}

async function uploadImgBB(file){

const formData = new FormData();
formData.append("image", file);

const response = await fetch(
`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,
{
method:"POST",
body:formData
}
);

const result = await response.json();

if(!result.success){
throw new Error("Upload gagal");
}

return result.data.url;
}

async function kirimWA(){

try{

const loading = document.getElementById("loading");
loading.style.display = "block";

const nama = document.getElementById("nama").value;
const via = document.getElementById("via").value;

const files =
document.getElementById("screenshots").files;

let imageLinks = [];

for(const file of files){

const link =
await uploadImgBB(file);

imageLinks.push(link);

}

let pesan =
`*FORM CLAIM GARANSI IBM STORE*

👤 Nama Buyer : ${nama}
📌 Order Via : ${via}

`;

if(via==="Website"){

pesan +=
`📅 Tanggal Pembelian :
${document.getElementById("webTanggal").value}

🛒 Data Pembelian :
${document.getElementById("webData").value}

⚠️ Kendala :
${document.getElementById("webMasalah").value}

`;

}

if(via==="Telegram"){

pesan +=
`🆔 Reff ID :
${document.getElementById("reffId").value}

📅 Tanggal Pembelian :
${document.getElementById("teleTanggal").value}

🛒 Data Orderan :
${document.getElementById("teleData").value}

⚠️ Kendala :
${document.getElementById("teleMasalah").value}

`;

}

if(via==="WhatsApp"){

pesan +=
`🛒 Data Orderan :
${document.getElementById("waData").value}

⚠️ Kendala :
${document.getElementById("waMasalah").value}

`;

}

if(imageLinks.length){

pesan += "📸 Screenshot :\n\n";

imageLinks.forEach((url,index)=>{
pesan += `${index+1}. ${url}\n`;
});

}

loading.style.display = "none";

window.open(
"https://wa.me/62895352265329?text="+
encodeURIComponent(pesan),
"_blank"
);

}catch(error){

document.getElementById("loading").style.display = "none";

alert(
"Gagal upload screenshot. Pastikan API Key ImgBB benar."
);

console.error(error);

}

}
</script>

</body>
</html>
