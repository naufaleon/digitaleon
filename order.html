<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xoftware Digital Store - Order</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-xl tracking-wider">XS</div>
                <div>
                    <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">Xoftware Store</h1>
                    <p class="text-xs text-gray-500">Automated Digital Product Gateway</p>
                </div>
            </div>
            
            <button onclick="daftarBot()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg shadow-sm transition flex items-center gap-2 text-sm cursor-pointer">
                <i class="fab fa-whatsapp text-lg"></i> Daftar Akun Bot
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <section class="bg-white p-6 rounded-xl border border-gray-100 shadow-xs mb-8">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center mb-4">
                <div class="w-full md:w-1/3 relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="search-input" oninput="filterProducts()" placeholder="Cari nama produk atau SKU..." class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-10 pr-4 py-2 text-sm outline-none focus:border-blue-500 transition">
                </div>
                <div class="flex items-center justify-between w-full md:w-auto mb-2 md:mb-0">
                    <h3 class="text-md font-bold text-gray-900">Filter Cepat</h3>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2" id="category-buttons">
                <button onclick="setCategoryFilter('')" class="cat-btn active bg-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">Semua</button>
                <button onclick="setCategoryFilter('capcut')" class="cat-btn bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">Capcut</button>
                <button onclick="setCategoryFilter('canva')" class="cat-btn bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">Canva</button>
                <button onclick="setCategoryFilter('gemini')" class="cat-btn bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">AI Gemini</button>
                <button onclick="setCategoryFilter('grok')" class="cat-btn bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">Grok</button>
                <button onclick="setCategoryFilter('youtube')" class="cat-btn bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">YouTube</button>
                <button onclick="setCategoryFilter('we tv')" class="cat-btn bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">We TV</button>
                <button onclick="setCategoryFilter('netflix')" class="cat-btn bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-4 py-2 rounded-lg transition cursor-pointer">Netflix</button>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-gray-900">Daftar Produk Tersedia</h3>
                <span class="bg-gray-200 text-gray-700 text-xs font-medium px-2.5 py-1 rounded-full">Live API</span>
            </div>

            <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center text-gray-500 py-8">
                    <i class="fas fa-spinner animate-spin text-2xl mb-2"></i>
                    <p>Memuat produk dari sistem...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-8 mt-16 text-xs text-center">
        <p>© 2026 Xoftware Digital Store. Powered by Xoftware Developer Team.</p>
    </footer>

    <script>
        const WHATSAPP_BOT_NUMBER = "62895352265329";
        
        // PENTING: Ganti URL di bawah ini ke alamat IP Pterodactyl Anda secara manual
        const BOT_SERVER_URL = "https://api.naufaleon.my.id:8443/api/products";
        
        let ALL_PRODUCTS = []; 
        let SELECTED_CATEGORY = "";

        async function loadProducts() {
            const container = document.getElementById('product-container');
            try {
                const response = await fetch(BOT_SERVER_URL);
                const result = await response.json();
                
                let produkArray = [];
                if (result.status && result.data) {
                    produkArray = Array.isArray(result.data.data) ? result.data.data : (Array.isArray(result.data) ? result.data : []);
                }
                
                // 1. FILTER: Buang yang harganya 0
                produkArray = produkArray.filter(product => (product.price || 0) > 0);
                
                // 2. SORTIR: Urutkan Alfabet Judul A-Z
                produkArray.sort((a, b) => {
                    const titleA = (a.title || "").toLowerCase();
                    const titleB = (b.title || "").toLowerCase();
                    return titleA.localeCompare(titleB);
                });

                ALL_PRODUCTS = produkArray;
                renderProducts(ALL_PRODUCTS);

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="col-span-full text-center text-rose-500 py-8">Gagal terhubung ke jembatan server API.</div>`;
            }
        }

        function renderProducts(productsList) {
            const container = document.getElementById('product-container');
            if (productsList.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-400 py-8">Produk tidak ditemukan atau tidak tersedia.</div>`;
                return;
            }

            container.innerHTML = "";
            productsList.forEach(product => {
                const tagDiskon = product.discount > 0 
                    ? `<span class="bg-rose-100 text-rose-700 text-xs font-bold px-2 py-1 rounded-md">Hemat Rp ${product.discount.toLocaleString('id-ID')}</span>`
                    : `<span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-md">Harga Terbaik</span>`;
                const tagReseller = product.is_reseller ? `<span class="bg-purple-100 text-purple-800 text-[10px] font-bold px-1.5 py-0.5 rounded-sm uppercase tracking-tight">Reseller</span>` : '';

                container.innerHTML += `
                    <div class="bg-white rounded-xl border border-gray-100 overflow-hidden flex flex-col justify-between hover:shadow-md transition p-5">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="bg-blue-50 text-blue-700 text-xs font-semibold px-2 py-0.5 rounded-sm uppercase">SKU: ${product.code}</span>
                                <div class="flex gap-1 items-center">${tagReseller}<span class="bg-emerald-50 text-emerald-700 text-xs font-medium px-2 py-0.5 rounded-sm">Stok: ${product.stock}</span></div>
                            </div>
                            <h4 class="text-lg font-bold text-gray-900 mb-1">${product.title}</h4>
                            <p class="text-xs text-gray-500 mb-4 line-clamp-2">${product.description || 'Tidak ada deskripsi.'}</p>
                            <div class="bg-gray-50 p-3 rounded-lg flex justify-between items-center mb-4">
                                <div>
                                    <span class="text-xs text-gray-400 line-through block">Rp ${(product.original_price || 0).toLocaleString('id-ID')}</span>
                                    <span class="text-xl font-black text-gray-900">Rp ${(product.price || 0).toLocaleString('id-ID')}</span>
                                </div>
                                ${tagDiskon}
                            </div>
                        </div>
                        <div>
                            <div class="flex gap-2 items-center mb-3">
                                <label class="text-xs text-gray-500 font-medium">Qty:</label>
                                <input type="number" id="qty-${product.code}" value="1" min="1" max="${product.stock}" class="w-16 bg-gray-50 border border-gray-200 rounded px-2 py-1 text-sm text-center font-semibold">
                            </div>
                            <button onclick="orderProduk('${product.code}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition flex items-center justify-center gap-2 cursor-pointer" ${product.stock < 1 ? 'disabled style="background-color:#cbd5e1; cursor:not-allowed;"' : ''}>
                                <i class="fas fa-shopping-cart text-xs"></i> ${product.stock < 1 ? 'Stok Habis' : 'Beli Sekarang (QRIS)'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        function filterProducts() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const filtered = ALL_PRODUCTS.filter(product => {
                const matchSearch = product.title.toLowerCase().includes(searchText) || product.code.toLowerCase().includes(searchText);
                const matchCategory = SELECTED_CATEGORY === "" || product.title.toLowerCase().includes(SELECTED_CATEGORY);
                return matchSearch && matchCategory;
            });
            renderProducts(filtered);
        }

        function setCategoryFilter(keyword) {
            SELECTED_CATEGORY = keyword.toLowerCase();
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'active');
                btn.classList.add('bg-gray-100', 'text-gray-700');
            });
            event.currentTarget.classList.remove('bg-gray-100', 'text-gray-700');
            event.currentTarget.classList.add('bg-blue-600', 'text-white', 'active');
            filterProducts();
        }

        function daftarBot() { window.open(`https://wa.me/${WHATSAPP_BOT_NUMBER}?text=${encodeURIComponent('#daftar')}`, '_blank'); }
        function orderProduk(skuCode) {
            const qty = document.getElementById(`qty-${skuCode}`).value;
            window.open(`https://wa.me/${WHATSAPP_BOT_NUMBER}?text=${encodeURIComponent(`#buynow ${skuCode} ${qty}`)}`, '_blank');
        }
        document.addEventListener("DOMContentLoaded", loadProducts);
    </script>
</body>
</html>
