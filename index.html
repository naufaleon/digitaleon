<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Naufaleon</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="stars"></div>

<main class="container">
  <img id="logo" class="logo"/>

  <h1 id="site-title"></h1>
  <p id="site-description"></p>

  <div id="buttons" class="buttons"></div>

  <section class="slider">
    <div class="slides" id="slides"></div>

    <button class="nav prev" id="prevBtn">‹</button>
    <button class="nav next" id="nextBtn">›</button>

    <div class="dots" id="dots"></div>
  </section>
</main>

<script>
let currentIndex = 0;

async function loadConfig() {
  const res = await fetch("config.json?t=" + Date.now());
  const config = await res.json();

  document.getElementById("site-title").textContent = config.title;
  document.getElementById("site-description").textContent = config.description;

  document.getElementById("logo").src = config.logo;

  renderButtons(config.buttons);
  renderSlides(config.posters);
}

function renderButtons(buttons) {
  const container = document.getElementById("buttons");
  container.innerHTML = "";

  buttons.forEach(btn => {
    const a = document.createElement("a");
    a.className = "btn";
    a.href = btn.url;
    a.target = "_blank";

    a.innerHTML = `
      <div class="btn-content">
        <div class="btn-icon-wrap">
          <img src="${btn.icon}" class="btn-icon">
        </div>
        <span class="btn-text">${btn.text}</span>
      </div>
    `;

    container.appendChild(a);
  });
}

function renderSlides(posters) {
  const slides = document.getElementById("slides");
  const dots = document.getElementById("dots");

  slides.innerHTML = "";
  dots.innerHTML = "";

  posters.forEach((src, i) => {

    const img = document.createElement("img");
    img.src = src;

    // 🔥 FIX: kalau gambar gagal load
    img.onerror = () => {
      img.outerHTML = `<div class="empty-slide">Gagal load gambar</div>`;
    };

    slides.appendChild(img);

    const dot = document.createElement("span");
    dot.className = "dot";
    dot.onclick = () => {
      currentIndex = i;
      updateSlide();
    };
    dots.appendChild(dot);
  });

  updateSlide();
}

function updateSlide() {
  const slides = document.getElementById("slides");
  slides.style.transform = `translateX(-${currentIndex * 100}%)`;
}

document.getElementById("nextBtn").onclick = () => {
  currentIndex++;
  updateSlide();
};

document.getElementById("prevBtn").onclick = () => {
  currentIndex--;
  updateSlide();
};

loadConfig();
</script>

</body>
</html>
