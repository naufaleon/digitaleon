<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naufaleon</title>
  <link rel="icon" href="https://i.ibb.co.com/bgLWg1SG/Logo-N.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars"></div>

  <main class="container">
    <section id="home-page">
      <img id="logo" class="logo" src="" alt="Logo" />

      <h1 id="site-title">Loading...</h1>
      <p id="site-description">Memuat data...</p>

      <div class="social-bar">
        <a href="https://facebook.com/naufaleon.fb" target="_blank" class="social-item" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12a12 12 0 1 0-13.9 11.9v-8.4H7.1V12h3V9.4c0-3 1.8-4.6 4.5-4.6 1.3 0 2.6.2 2.6.2v2.9h-1.5c-1.5 0-2 1-2 1.9V12h3.4l-.5 3.5h-2.9v8.4A12 12 0 0 0 24 12"/></svg>
        </a>

        <a href="https://instagram.com/naufaleon.id" target="_blank" class="social-item" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24"><path fill="#E4405F" d="M7 2C4.8 2 3 3.8 3 6v12c0 2.2 1.8 4 4 4h10c2.2 0 4-1.8 4-4V6c0-2.2-1.8-4-4-4H7m5 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10m6.5-1.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z"/></svg>
        </a>

        <a href="https://tiktok.com/@naufaleon.id" target="_blank" class="social-item" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24"><path fill="#fff" d="M12 2h3a5 5 0 0 0 5 5v3a8 8 0 0 1-5-1.7V15a5 5 0 1 1-5-5h1v3h-1a2 2 0 1 0 2 2V2Z"/></svg>
        </a>

        <a href="https://youtube.com/@naufaleon_id" target="_blank" class="social-item" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24"><path fill="#FF0000" d="M23 12s0-3-1-4-4-1-4-1H6S3 7 2 8s-1 4-1 4 0 3 1 4 4 1 4 1h12s3 0 4-1 1-4 1-4M10 15V9l5 3-5 3Z"/></svg>
        </a>
      </div>

      <div id="buttons" class="buttons"></div>

      <section class="slider">
        <div class="slides" id="slides"></div>

        <button class="nav prev" id="prevBtn" type="button">‹</button>
        <button class="nav next" id="nextBtn" type="button">›</button>

        <div class="dots" id="dots"></div>
      </section>
    </section>

    <section id="product-page" class="product-page hidden">
      <div class="product-card">
        <div class="product-media">
          <img id="product-image" class="product-image" src="" alt="Foto Produk" />
        </div>

        <div class="product-content">
          <div class="product-badge">Produk Digital</div>
          <h1 id="product-name" class="product-name">Nama Produk</h1>
          <p id="product-subtitle" class="product-subtitle">Subtitle produk</p>

          <div class="product-price-box">
            <span class="price-label">Harga</span>
            <div id="product-price" class="product-price">Rp0</div>
          </div>

          <div class="product-actions">
            <a id="order-button" class="action-btn primary" href="#" target="_blank" rel="noopener noreferrer">
              Order Sekarang
            </a>
            <a id="wa-button" class="action-btn secondary" href="#" target="_blank" rel="noopener noreferrer">
              WhatsApp CS
            </a>
          </div>
        </div>
      </div>

      <div class="product-sections">
        <section class="info-card">
          <h2>Benefit</h2>
          <ul id="product-benefits" class="info-list"></ul>
        </section>

        <section class="info-card">
          <h2>Keterangan / Deskripsi</h2>
          <div id="product-description" class="info-text"></div>
        </section>

        <section class="info-card">
          <h2>Cara Pakai</h2>
          <ol id="product-howto" class="info-list ordered"></ol>
        </section>
      </div>
    </section>
  </main>

  <script>
    let currentIndex = 0;
    let autoSlideInterval = null;

    function normalizePath(path) {
      if (!path) return "/";
      let result = path.trim();
      if (!result.startsWith("/")) result = "/" + result;
      if (result.length > 1 && result.endsWith("/")) result = result.slice(0, -1);
      return result;
    }

    function escapeHtml(text = "") {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function handleRedirects(redirects = []) {
      const currentPath = normalizePath(window.location.pathname);

      const found = redirects.find((item) => {
        if (!item || typeof item !== "object") return false;
        return normalizePath(item.path) === currentPath;
      });

      if (found && found.url) {
        window.location.replace(found.url);
        return true;
      }

      return false;
    }

    function findProductByPath(products = []) {
      const currentPath = normalizePath(window.location.pathname);
      return products.find((item) => item && normalizePath(item.path) === currentPath) || null;
    }

    function showHomePage() {
      document.getElementById("home-page").classList.remove("hidden");
      document.getElementById("product-page").classList.add("hidden");
    }

    function showProductPage() {
      document.getElementById("home-page").classList.add("hidden");
      document.getElementById("product-page").classList.remove("hidden");
    }

    function renderProduct(product) {
      showProductPage();

      document.title = product.name || "Produk Digital";

      const imageEl = document.getElementById("product-image");
      imageEl.src = product.image || "";
      imageEl.style.display = product.image ? "block" : "none";

      document.getElementById("product-name").textContent = product.name || "Tanpa Nama";
      document.getElementById("product-subtitle").textContent = product.subtitle || "";
      document.getElementById("product-price").textContent = product.price || "-";

      const orderBtn = document.getElementById("order-button");
      orderBtn.href = product.orderUrl || "#";

      const waBtn = document.getElementById("wa-button");
      waBtn.href = product.whatsappUrl || "#";

      const benefitsEl = document.getElementById("product-benefits");
      benefitsEl.innerHTML = "";

      (product.benefits || []).forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        benefitsEl.appendChild(li);
      });

      const descEl = document.getElementById("product-description");
      descEl.innerHTML = String(product.description || "")
        .split("\n")
        .map((line) => `<p>${escapeHtml(line)}</p>`)
        .join("");

      const howToEl = document.getElementById("product-howto");
      howToEl.innerHTML = "";

      (product.howToUse || []).forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        howToEl.appendChild(li);
      });
    }

    async function loadConfig() {
      try {
        const res = await fetch("config.json?t=" + Date.now());
        if (!res.ok) throw new Error("Gagal memuat config.json");
        const config = await res.json();

        if (handleRedirects(config.redirects || [])) return;

        const matchedProduct = findProductByPath(config.products || []);
        if (matchedProduct) {
          renderProduct(matchedProduct);
          return;
        }

        showHomePage();

        document.title = config.title || "Website";
        document.getElementById("site-title").textContent = config.title || "";
        document.getElementById("site-description").textContent = config.description || "";

        const logo = document.getElementById("logo");
        logo.src = config.logo || "";
        logo.style.display = config.logo ? "block" : "none";

        renderButtons(config.buttons || []);
        renderSlides(config.posters || []);
      } catch (err) {
        console.error(err);
        document.getElementById("site-title").textContent = "Gagal memuat data";
        document.getElementById("site-description").textContent = "Periksa config.json";
      }
    }

    function renderButtons(buttons) {
      const container = document.getElementById("buttons");
      container.innerHTML = "";

      buttons.forEach((btn) => {
        const a = document.createElement("a");
        a.className = "btn";
        a.href = btn.url || "#";

        if ((btn.url || "").startsWith("http")) {
          a.target = "_blank";
          a.rel = "noopener noreferrer";
        } else {
          a.target = "_self";
        }

        const content = document.createElement("div");
        content.className = "btn-content";

        const iconWrap = document.createElement("div");
        iconWrap.className = "btn-icon-wrap";

        if (btn.icon) {
          const img = document.createElement("img");
          img.src = btn.icon;
          img.alt = btn.text || "icon";
          img.className = "btn-icon";
          iconWrap.appendChild(img);
        }

        const textWrap = document.createElement("div");
        textWrap.className = "btn-text-wrap";

        const text = document.createElement("div");
        text.className = "btn-text";
        text.textContent = btn.text || "Button";

        textWrap.appendChild(text);
        content.appendChild(iconWrap);
        content.appendChild(textWrap);
        a.appendChild(content);
        container.appendChild(a);

        requestAnimationFrame(() => {
          if (text.scrollWidth > textWrap.clientWidth) {
            text.classList.add("marquee");
            const clone = text.cloneNode(true);
            clone.classList.add("btn-text-clone");
            textWrap.appendChild(clone);
          }
        });
      });
    }

    function renderSlides(posters) {
      const slides = document.getElementById("slides");
      const dots = document.getElementById("dots");

      slides.innerHTML = "";
      dots.innerHTML = "";
      currentIndex = 0;

      if (!posters.length) {
        slides.innerHTML = '<div class="empty-slide">Belum ada poster</div>';
        document.getElementById("prevBtn").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        return;
      }

      document.getElementById("prevBtn").style.display = "grid";
      document.getElementById("nextBtn").style.display = "grid";

      posters.forEach((src, index) => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = `Poster ${index + 1}`;
        slides.appendChild(img);

        const dot = document.createElement("span");
        dot.className = "dot" + (index === 0 ? " active" : "");
        dot.addEventListener("click", () => goToSlide(index));
        dots.appendChild(dot);
      });

      updateSlide();
      startAutoSlide();
    }

    function updateSlide() {
      const slides = document.getElementById("slides");
      const dots = document.querySelectorAll(".dot");
      slides.style.transform = `translateX(-${currentIndex * 100}%)`;
      dots.forEach((dot, i) => dot.classList.toggle("active", i === currentIndex));
    }

    function nextSlide() {
      const total = document.querySelectorAll("#slides img").length;
      if (!total) return;
      currentIndex = (currentIndex + 1) % total;
      updateSlide();
    }

    function prevSlide() {
      const total = document.querySelectorAll("#slides img").length;
      if (!total) return;
      currentIndex = (currentIndex - 1 + total) % total;
      updateSlide();
    }

    function goToSlide(index) {
      currentIndex = index;
      updateSlide();
      restartAutoSlide();
    }

    function startAutoSlide() {
      stopAutoSlide();
      autoSlideInterval = setInterval(nextSlide, 4000);
    }

    function stopAutoSlide() {
      if (autoSlideInterval) clearInterval(autoSlideInterval);
    }

    function restartAutoSlide() {
      stopAutoSlide();
      startAutoSlide();
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
      nextSlide();
      restartAutoSlide();
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      prevSlide();
      restartAutoSlide();
    });

    let touchStartX = 0;
    const slidesEl = document.getElementById("slides");

    slidesEl.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].clientX;
    });

    slidesEl.addEventListener("touchend", (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      if (touchStartX - touchEndX > 50) {
        nextSlide();
        restartAutoSlide();
      } else if (touchEndX - touchStartX > 50) {
        prevSlide();
        restartAutoSlide();
      }
    });

    loadConfig();
  </script>
</body>
</html>
