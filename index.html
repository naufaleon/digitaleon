<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Naufaleon</title>

  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="stars"></div>

  <main class="container">
    <img id="logo" class="logo" src="" alt="Logo" />

    <h1 id="site-title">Loading...</h1>
    <p id="site-description">Memuat data...</p>

    <div id="buttons" class="buttons"></div>
  </main>

  <script>
    async function loadConfig() {
      try {
        const res = await fetch("config.json?t=" + Date.now());
        const config = await res.json();

        document.getElementById("site-title").textContent = config.title;
        document.getElementById("site-description").textContent = config.description;

        const logo = document.getElementById("logo");
        logo.src = config.logo;

        renderButtons(config.buttons || []);
      } catch (err) {
        document.getElementById("site-title").textContent = "Error load config";
      }
    }

    function renderButtons(buttons) {
      const container = document.getElementById("buttons");
      container.innerHTML = "";

      buttons.forEach((btn) => {
        const a = document.createElement("a");
        a.className = "btn";
        a.href = btn.url;
        a.target = "_blank";

        const content = document.createElement("div");
        content.className = "btn-content";

        // ICON
        if (btn.icon) {
          const img = document.createElement("img");
          img.src = btn.icon;
          img.className = "btn-icon";
          content.appendChild(img);
        }

        // TEXT WRAPPER
        const wrapper = document.createElement("div");
        wrapper.className = "btn-text-wrapper";

        const text = document.createElement("div");
        text.className = "btn-text";
        text.textContent = btn.text;

        wrapper.appendChild(text);
        content.appendChild(wrapper);

        a.appendChild(content);
        container.appendChild(a);

        // AUTO RUNNING TEXT
        setTimeout(() => {
          if (text.scrollWidth > wrapper.clientWidth) {
            text.classList.add("move");
          }
        }, 100);
      });
    }

    loadConfig();
  </script>
</body>
</html>
