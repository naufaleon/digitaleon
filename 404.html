<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071533;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .stars::before,
    .stars::after {
      content: "";
      position: absolute;
      inset: -100%;
    }

    .stars::before {
      background-image: radial-gradient(white 1.5px, transparent 1.5px);
      background-size: 40px 40px;
      animation: moveStars 25s linear infinite;
      opacity: 0.5;
    }

    .stars::after {
      background-image: radial-gradient(white 2px, transparent 2px);
      background-size: 80px 80px;
      animation: moveStars 50s linear infinite;
      opacity: 0.2;
    }

    @keyframes moveStars {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(-300px, -300px);
      }
    }

    .container {
      width: 90%;
      max-width: 760px;
      margin: 0 auto;
      padding: 50px 15px 70px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.25);
    }

    .center {
      text-align: center;
    }

    .badge {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(92, 225, 230, 0.14);
      border: 1px solid rgba(92, 225, 230, 0.35);
      color: #bdfcff;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .page-image {
      width: 100%;
      max-height: 380px;
      object-fit: cover;
      display: block;
      border-radius: 20px;
      margin: 0 0 22px;
      background: rgba(255,255,255,0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      line-height: 1.2;
    }

    p {
      opacity: 1;
      color: rgba(255,255,255,0.86);
      line-height: 1.8;
      font-size: 15px;
      margin: 0 0 12px;
      white-space: pre-line;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .main-button,
    .back {
      display: inline-flex;
      min-height: 46px;
      padding: 12px 18px;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      font-weight: 700;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      transition: 0.25s ease;
    }

    .main-button:hover,
    .back:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.18);
    }

    .main-button:visited,
    .back:visited {
      color: white;
    }

    @media (max-width: 480px) {
      .container {
        width: 94%;
        padding: 28px 10px 50px;
      }

      .card {
        padding: 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      .button-row {
        flex-direction: column;
      }

      .main-button,
      .back {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <main class="container">
    <div id="app" class="card center">
      <h1>Loading...</h1>
      <p>Sedang memuat halaman.</p>
    </div>
  </main>

  <script>
    function normalizePath(path) {
      if (!path) return "/";
      let result = path.trim();
      if (!result.startsWith("/")) result = "/" + result;
      if (result.length > 1 && result.endsWith("/")) result = result.slice(0, -1);
      return result;
    }

    function escapeHtml(text = "") {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderPage(page) {
      document.title = page.title || "Info Page";

      document.getElementById("app").classList.remove("center");

      document.getElementById("app").innerHTML = `
        <div class="badge">Info Page</div>

        ${page.image ? `
          <img class="page-image" src="${escapeHtml(page.image)}" alt="${escapeHtml(page.title || "Image")}" />
        ` : ""}

        <h1>${escapeHtml(page.title || "Tanpa Judul")}</h1>

        ${page.description ? `<p>${escapeHtml(page.description)}</p>` : ""}
        ${page.description2 ? `<p>${escapeHtml(page.description2)}</p>` : ""}
        ${page.description3 ? `<p>${escapeHtml(page.description3)}</p>` : ""}

        <div class="button-row">
          ${page.buttonUrl ? `
            <a class="main-button" href="${escapeHtml(page.buttonUrl)}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(page.buttonText || "Buka Link")}
            </a>
          ` : ""}

          <a class="back" href="/">Kembali ke Beranda</a>
        </div>
      `;
    }

    function renderNotFound() {
      document.title = "404";

      document.getElementById("app").innerHTML = `
        <h1>404</h1>
        <p>Halaman tidak ditemukan.</p>

        <div class="button-row">
          <a class="back" href="/">Kembali ke Beranda</a>
        </div>
      `;
    }

    async function load404Handler() {
      const currentPath = normalizePath(window.location.pathname);

      try {
        const redirectRes = await fetch("/config.json?t=" + Date.now());

        if (redirectRes.ok) {
          const config = await redirectRes.json();
          const redirects = Array.isArray(config.redirects) ? config.redirects : [];

          const foundRedirect = redirects.find((item) => {
            if (!item || typeof item !== "object") return false;
            return normalizePath(item.path) === currentPath;
          });

          if (foundRedirect && foundRedirect.url) {
            window.location.replace(foundRedirect.url);
            return;
          }
        }

        const pagesRes = await fetch("/config-pages.json?t=" + Date.now());

        if (pagesRes.ok) {
          const pagesConfig = await pagesRes.json();
          const pages = Array.isArray(pagesConfig.pages) ? pagesConfig.pages : [];

          const foundPage = pages.find((item) => {
            if (!item || typeof item !== "object") return false;
            return normalizePath(item.path) === currentPath;
          });

          if (foundPage) {
            renderPage(foundPage);
            return;
          }
        }

        renderNotFound();
      } catch (err) {
        console.error(err);
        renderNotFound();
      }
    }

    load404Handler();
  </script>
</body>
</html>
