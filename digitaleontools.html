<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitaleon Tools</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:url('https://i.ibb.co.com/hxrJRM74/Whats-App-Image-2026-04-11-at-02-49-38.jpg') center/cover no-repeat;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  padding:20px;
}

.menu{
  text-align:center;
  width:100%;
  max-width:900px;
}

.menu-grid{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}

.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  cursor:pointer;
  transition:.3s;
  width:150px;
  text-decoration:none;
  color:#fff;
  display:block;
}

.card:hover{transform:scale(1.05)}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:10px;
  background:rgba(255,255,255,0.15);
}

.title{
  margin-top:10px;
  font-weight:bold;
  word-break:break-word;
}

.empty-tools{
  margin-top:20px;
  background:rgba(255,255,255,0.12);
  padding:16px;
  border-radius:14px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:99;
  padding:16px;
}

.modal-box{
  background:#2f3441;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
  background:#3c4252;
  color:#fff;
}

label{margin-top:10px;display:block}

button{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#5a6275;
  color:#fff;
  cursor:pointer;
}

.desc{
  font-size:12px;
  color:#ccc;
  margin-top:5px;
}

/* RESULT */
.result{
  margin-top:20px;
  background:#3c4252;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

hr{margin:10px 0;border:1px solid #777}
</style>
</head>

<body>

<div class="menu">
  <h1>Digitaleon Tools</h1>
  <div class="menu-grid" id="toolsContainer"></div>

  <a href="index.html" style="
    display:inline-block;
    margin-top:30px;
    padding:12px 25px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    backdrop-filter:blur(5px);
    color:white;
    text-decoration:none;
    font-weight:bold;
  ">
    ← Back to Menu
  </a>
</div>

<!-- MODAL REFUND -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2>Calculator Refund</h2>

    <label>Mode</label>
    <select id="mode">
      <option>Seller</option>
      <option>Buyer</option>
    </select>

    <label>Harga Beli (Rp)</label>
    <input type="number" id="harga">

    <label>Tanggal Beli</label>
    <input type="date" id="tglBeli">

    <label>Tanggal Error</label>
    <input type="date" id="tglError">

    <label>Durasi</label>
    <select id="durasi">
      <option value="7">7 hari</option>
      <option value="30">30 hari</option>
      <option value="60">60 hari</option>
      <option value="90">90 hari</option>
    </select>

    <label>Fee</label>
    <select id="fee">
      <option value="0.7">0.7 ( Garansi 4x )</option>
      <option value="0.8">0.8 ( Garansi 3x )</option>
      <option value="0.9">0.9 ( Garansi 2x )</option>
      <option value="0.95">0.95 ( Garansi 1x )</option>
    </select>

    <div class="desc">
      Fee Seller adalah jasa layanan proses garansi, pergantian produk baru dan jasa replace
    </div>

    <button onclick="hitung()">Hitung Refund</button>
    <div id="hasil"></div>
    <button onclick="closeModal()">Back</button>
  </div>
</div>

<script>
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function hitung() {
  const harga = parseInt(document.getElementById("harga").value || "0");
  const tglBeliVal = document.getElementById("tglBeli").value;
  const tglErrorVal = document.getElementById("tglError").value;
  const durasi = parseInt(document.getElementById("durasi").value || "0");
  const fee = parseFloat(document.getElementById("fee").value || "0");

  if (!harga || !tglBeliVal || !tglErrorVal || !durasi || !fee) {
    document.getElementById("hasil").innerHTML = `
      <div class="result">
        <b>Isi semua data dulu</b>
      </div>
    `;
    return;
  }

  const tglBeli = new Date(tglBeliVal);
  const tglError = new Date(tglErrorVal);

  let selisih = (tglError - tglBeli) / (1000 * 60 * 60 * 24);
  if (isNaN(selisih)) selisih = 0;

  let sisa = durasi - selisih;
  if (sisa < 0) sisa = 0;

  const refund = harga * (sisa / durasi) * fee;

  document.getElementById("hasil").innerHTML = `
    <div class="result">
      <b>📊 Hasil Refund</b><br><br>
      Harga: Rp ${harga.toLocaleString("id-ID")}<br>
      Durasi: ${durasi} hari<br>
      Sisa: ${Math.round(sisa)} hari<br>
      Fee: ${fee}<br>
      <hr>
      <b>Total: Rp ${Math.round(refund).toLocaleString("id-ID")}</b>
    </div>
  `;
}

async function loadTools() {
  try {
    const res = await fetch("config.json?t=" + Date.now());
    if (!res.ok) throw new Error("Gagal memuat config.json");

    const config = await res.json();
    const tools = Array.isArray(config.tools) ? config.tools : [];
    const container = document.getElementById("toolsContainer");

    container.innerHTML = "";

    if (!tools.length) {
      container.innerHTML = `<div class="empty-tools">Belum ada tools</div>`;
      return;
    }

    tools.forEach((tool) => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = tool.url || "#";

      const isModalRefund =
        tool.url === "#refund" ||
        tool.url === "modal:refund" ||
        tool.url === "refund";

      if (isModalRefund) {
        card.href = "javascript:void(0)";
        card.addEventListener("click", openModal);
      } else {
        card.target = "_blank";
        card.rel = "noopener noreferrer";
      }

      const img = document.createElement("img");
      img.src = tool.icon || "https://via.placeholder.com/300x200?text=Tool";
      img.alt = tool.text || "Tool";

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = tool.text || "Untitled Tool";

      card.appendChild(img);
      card.appendChild(title);
      container.appendChild(card);
    });
  } catch (err) {
    console.error(err);
    document.getElementById("toolsContainer").innerHTML =
      `<div class="empty-tools">Gagal memuat tools</div>`;
  }
}

loadTools();
</script>

</body>
</html>
