<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --text: #ffffff;
      --shadow: rgba(0, 0, 0, 0.55);
      --card: rgba(255, 255, 255, 0.12);
      --card-border: rgba(255, 255, 255, 0.25);
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: var(--text);
      overflow: hidden;
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: url('https://i.ibb.co.com/hxrJRM74/Whats-App-Image-2026-04-11-at-02-49-38.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.55));
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    .clock-wrap {
      width: min(82vw, 300px);
      height: min(82vw, 300px);
      border: 5px solid rgba(255,255,255,0.95);
      border-radius: 50%;
      position: relative;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 999px;
    }

    .hour {
      width: 6px;
      height: 68px;
      background: white;
      margin-left: -3px;
    }

    .minute {
      width: 4px;
      height: 96px;
      background: white;
      margin-left: -2px;
    }

    .second {
      width: 2px;
      height: 108px;
      background: rgba(255,255,255,0.8);
      margin-left: -1px;
    }

    .center-dot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.15);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 18px;
      width: 100%;
      max-width: 360px;
    }

    .menu-btn,
    .back-btn {
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .menu-btn:hover,
    .back-btn:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.18);
    }

    .icon-box {
      width: 96px;
      height: 96px;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      padding: 10px;
      overflow: hidden;
    }

    .icon-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .label {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.15;
      text-shadow: 0 3px 8px var(--shadow);
    }

    .back-btn {
      width: 100%;
      max-width: 360px;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 18px 20px;
      text-shadow: 0 3px 8px var(--shadow);
    }

    .note {
      font-size: 0.9rem;
      opacity: 0.9;
      text-shadow: 0 3px 8px var(--shadow);
    }

    @media (max-width: 480px) {
      .content {
        gap: 22px;
      }

      .menu-grid {
        gap: 14px;
      }

      .label {
        font-size: 1.1rem;
      }

      .back-btn {
        font-size: 1rem;
      }

      .icon-box {
        width: 88px;
        height: 88px;
      }
    }
  </style>
</head>
<body>

  <!-- Modal Calculator Refund -->
<div id="refundModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>

    <h2>Calculator Refund</h2>

    <label>Mode</label>
    <select>
      <option>Seller</option>
      <option>Buyer</option>
    </select>

    <label>Harga Beli (Rp)</label>
    <input type="number" placeholder="contoh: 29500">

    <label>Tanggal Beli</label>
    <input type="date">

    <label>Tanggal Error</label>
    <input type="date">

    <label>Durasi (hari)</label>
    <select>
      <option>7 hari</option>
      <option>30 hari (1 bulan)</option>
      <option>60 hari (2 bulan)</option>
      <option>90 hari (3 bulan)</option>
      <option>Custom</option>
    </select>

    <label>Fee (Seller)</label>
    <select>
      <option>0.7</option>
      <option>0.8</option>
      <option>0.9</option>
      <option>0.95</option>
      <option>Custom</option>
    </select>

    <!-- Deskripsi -->
    <p class="fee-desc">
      Fee Seller adalah jasa layanan proses garansi, pergantian produk baru dan jasa replace
    </p>

    <button class="btn">Hitung Refund</button>
    <button class="btn back">← Back to Home</button>
  </div>
</div>
  
  
  <div class="app">
    <main class="content">
      <div class="clock-wrap" aria-label="Jam analog">
        <div class="hand hour" id="hourHand"></div>
        <div class="hand minute" id="minuteHand"></div>
        <div class="hand second" id="secondHand"></div>
        <div class="center-dot"></div>
      </div>

      <section class="menu-grid">
        <a class="menu-btn" href="#">
          <div class="icon-box">
            <img src="https://i.ibb.co.com/Pzb1fbDd/Whats-App-Image-2026-04-11-at-03-21-53.jpg" alt="">
            Calculator
          </div>
          <div class="label">Calculator Refund</div>
        </a>

        <a class="menu-btn" href="#">
          <div class="icon-box">
            <img src="https://i.ibb.co.com/nspBMmw7/Whats-App-Image-2026-04-11-at-03-21-54.jpg" alt="">
            Aris
          </div>
          <div class="label">Qris Dinamis Generator</div>
        </a>
      </section>

      <a class="back-btn" href="index.html">Back to Menu</a>

      <div class="note">Digitaleon 2026</div>
    </main>
  </div>

  <script>
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');

    function updateClock() {
      const now = new Date();
      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();

      const secondDeg = seconds * 6;
      const minuteDeg = minutes * 6 + seconds * 0.1;
      const hourDeg = (hours % 12) * 30 + minutes * 0.5;

      hourHand.style.transform = `rotate(${hourDeg}deg)`;
      minuteHand.style.transform = `rotate(${minuteDeg}deg)`;
      secondHand.style.transform = `rotate(${secondDeg}deg)`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
