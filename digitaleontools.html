<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitaleon Tools</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:url('https://i.ibb.co.com/hxrJRM74/Whats-App-Image-2026-04-11-at-02-49-38.jpg') center/cover no-repeat;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  padding:20px;
}

.menu{
  text-align:center;
  width:100%;
  max-width:900px;
}

.menu-grid{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}

.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  cursor:pointer;
  transition:.3s;
  width:150px;
}

.card:hover{transform:scale(1.05)}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:10px;
}

.title{
  margin-top:10px;
  font-weight:bold;
}

.empty{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.2);
  border-radius:15px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:99;
}

.modal-box{
  background:#2f3441;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
  background:#3c4252;
  color:#fff;
}

label{margin-top:10px;display:block}

button{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#5a6275;
  color:#fff;
  cursor:pointer;
}

.result{
  margin-top:20px;
  background:#3c4252;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

hr{margin:10px 0;border:1px solid #777}
</style>
</head>

<body>

<div class="menu">
  <h1>Digitaleon Tools</h1>

  <div class="menu-grid" id="tools"></div>

  <a href="index.html" style="
    display:inline-block;
    margin-top:30px;
    padding:12px 25px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    color:white;
    text-decoration:none;
    font-weight:bold;
  ">
    ← Back to Menu
  </a>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h2>Calculator Refund</h2>

    <label>Harga (Rp)</label>
    <input type="number" id="harga">

    <label>Tanggal Beli</label>
    <input type="date" id="tglBeli">

    <label>Tanggal Error</label>
    <input type="date" id="tglError">

    <!-- DURASI -->
    <label>Durasi</label>
    <select id="durasi" onchange="toggleCustomDurasi()">
      <option value="7">7 hari</option>
      <option value="30">30 hari</option>
      <option value="60">60 hari</option>
      <option value="90">90 hari</option>
      <option value="custom">Custom</option>
    </select>

    <input type="number" id="customDurasi" placeholder="Custom hari" style="display:none">

    <!-- FEE -->
    <label>Fee</label>
    <select id="fee" onchange="toggleCustomFee()">
      <option value="0.7">0.7</option>
      <option value="0.8">0.8</option>
      <option value="0.9">0.9</option>
      <option value="0.95">0.95</option>
      <option value="custom">Custom</option>
    </select>

    <input type="number" step="0.01" id="customFee" placeholder="0.1 - 0.99" style="display:none">

    <button onclick="hitung()">Hitung</button>

    <div id="hasil"></div>

    <button onclick="closeModal()">Back</button>

  </div>
</div>

<script>
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ===== CUSTOM FIELD ===== */
function toggleCustomDurasi(){
  document.getElementById("customDurasi").style.display =
    document.getElementById("durasi").value === "custom" ? "block" : "none";
}

function toggleCustomFee(){
  document.getElementById("customFee").style.display =
    document.getElementById("fee").value === "custom" ? "block" : "none";
}

/* ===== HITUNG ===== */
function hitung(){
  let harga = parseInt(document.getElementById("harga").value);

  let tglBeli = new Date(document.getElementById("tglBeli").value);
  let tglError = new Date(document.getElementById("tglError").value);

  let durasi = document.getElementById("durasi").value === "custom"
    ? parseInt(document.getElementById("customDurasi").value)
    : parseInt(document.getElementById("durasi").value);

  let fee = document.getElementById("fee").value === "custom"
    ? parseFloat(document.getElementById("customFee").value)
    : parseFloat(document.getElementById("fee").value);

  if(!harga || !durasi || !fee){
    alert("Isi semua data!");
    return;
  }

  if(fee < 0.1 || fee > 0.99){
    alert("Fee harus 0.1 - 0.99");
    return;
  }

  let selisih = (tglError - tglBeli) / (1000*60*60*24);
  let sisa = durasi - selisih;

  if(sisa < 0) sisa = 0;

  let refund = harga * (sisa/durasi) * fee;

  document.getElementById("hasil").innerHTML = `
    <div class="result">
      Harga: Rp ${harga.toLocaleString()}<br>
      Durasi: ${durasi} hari<br>
      Sisa: ${Math.round(sisa)} hari<br>
      Fee: ${fee}<br>
      <hr>
      <b>Total: Rp ${Math.round(refund).toLocaleString()}</b>
    </div>
  `;
}

/* ===== LOAD TOOLS ===== */
async function loadTools(){
  const res = await fetch("config.json?t="+Date.now());
  const config = await res.json();

  const container = document.getElementById("tools");
  container.innerHTML = "";

  if(!config.tools || config.tools.length === 0){
    container.innerHTML = "<div class='empty'>Belum ada tools</div>";
    return;
  }

  config.tools.forEach(tool => {
    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => {
      if(tool.url === "#refund"){
        openModal();
      } else {
        window.open(tool.url, "_blank");
      }
    };

    div.innerHTML = `
      <img src="${tool.icon}">
      <div class="title">${tool.text}</div>
    `;

    container.appendChild(div);
  });
}

loadTools();
</script>

</body>
</html>
